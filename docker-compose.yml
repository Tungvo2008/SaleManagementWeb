services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/app.db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_ISSUER: ${JWT_ISSUER:-warehouse-backend}
      SESSION_IDLE_TTL_MINUTES: ${SESSION_IDLE_TTL_MINUTES:-480}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
